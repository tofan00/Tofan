<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول | Tofan Store</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>

  <style>
    :root{
      --primary:#14454d;
      --accent:#f37021;
      --soft:#f8fafc;
      --line:#e5e7eb;
      --danger:#ef4444;
      --success:#16a34a;
    }

    *{box-sizing:border-box}
    body{
      font-family:'Cairo',sans-serif;
      background:linear-gradient(180deg,#f8fafc 0%,#eef4f6 100%);
      min-height:100vh;
      color:#1f2937;
      -webkit-tap-highlight-color:transparent;
    }

    .top-loading{
      position:fixed;
      top:0;
      right:0;
      height:3px;
      width:0;
      background:linear-gradient(90deg,var(--primary),var(--accent));
      z-index:9999;
      transition:width .3s ease;
    }

    .glass-card{
      background:rgba(255,255,255,.9);
      backdrop-filter:blur(12px);
      border:1px solid rgba(255,255,255,.6);
      box-shadow:0 20px 50px rgba(20,69,77,.08);
    }

    .store-badge{
      box-shadow:0 14px 35px rgba(20,69,77,.14);
    }

    .tab-btn{
      transition:.25s ease;
      border-radius:999px;
      font-weight:800;
      padding:14px 10px;
    }

    .tab-btn.active{
      background:var(--primary);
      color:#fff;
      box-shadow:0 10px 24px rgba(20,69,77,.18);
    }

    .tab-btn.inactive{
      background:#f3f4f6;
      color:#4b5563;
    }

    .field-wrap{
      position:relative;
    }

    .field-input{
      width:100%;
      border:none;
      outline:none;
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:20px;
      padding:15px 16px;
      font-size:14px;
      font-weight:700;
      transition:.2s ease;
    }

    .field-input:focus{
      border-color:var(--primary);
      box-shadow:0 0 0 4px rgba(20,69,77,.08);
      background:#fff;
    }

    .field-label{
      display:block;
      font-size:12px;
      font-weight:800;
      color:#6b7280;
      margin-bottom:8px;
      margin-right:6px;
    }

    html[dir="ltr"] .field-label{
      margin-right:0;
      margin-left:6px;
      text-align:left;
    }

    .primary-btn{
      width:100%;
      border:none;
      border-radius:999px;
      background:var(--primary);
      color:#fff;
      padding:15px 18px;
      font-weight:900;
      font-size:15px;
      transition:.2s ease;
      box-shadow:0 14px 30px rgba(20,69,77,.18);
    }

    .primary-btn:active{transform:scale(.98)}
    .primary-btn:disabled{opacity:.7;cursor:not-allowed}

    .secondary-btn{
      width:100%;
      border:none;
      border-radius:999px;
      background:#eff6ff;
      color:#1d4ed8;
      padding:14px 18px;
      font-weight:900;
      transition:.2s ease;
    }

    .secondary-btn:active{transform:scale(.98)}

    .ghost-btn{
      width:100%;
      border:none;
      border-radius:999px;
      background:#f3f4f6;
      color:#374151;
      padding:14px 18px;
      font-weight:900;
      transition:.2s ease;
    }

    .ghost-btn:active{transform:scale(.98)}

    .toast{
      position:fixed;
      bottom:26px;
      left:50%;
      transform:translateX(-50%);
      background:#111827;
      color:#fff;
      border-radius:999px;
      padding:12px 18px;
      z-index:9999;
      font-size:13px;
      font-weight:800;
      box-shadow:0 12px 32px rgba(0,0,0,.16);
      animation:toastUp .22s ease;
      white-space:nowrap;
      max-width:90%;
      overflow:hidden;
      text-overflow:ellipsis;
    }

    @keyframes toastUp{
      from{opacity:0;transform:translate(-50%,18px)}
      to{opacity:1;transform:translate(-50%,0)}
    }

    .loader-overlay{
      position:fixed;
      inset:0;
      background:rgba(255,255,255,.8);
      backdrop-filter:blur(6px);
      z-index:9998;
      display:none;
      align-items:center;
      justify-content:center;
    }

    .loader-box{
      background:#fff;
      border:1px solid #eef2f7;
      border-radius:28px;
      padding:24px 28px;
      box-shadow:0 20px 50px rgba(0,0,0,.08);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:12px;
    }

    .spinner{
      width:44px;
      height:44px;
      border:4px solid #e5e7eb;
      border-top-color:var(--primary);
      border-radius:50%;
      animation:spin .8s linear infinite;
    }

    @keyframes spin{
      to{transform:rotate(360deg)}
    }

    .fade-in{
      animation:fadeIn .35s ease;
    }

    @keyframes fadeIn{
      from{opacity:0;transform:translateY(12px)}
      to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>

  <div id="topLoading" class="top-loading"></div>

  <div id="loaderOverlay" class="loader-overlay">
    <div class="loader-box">
      <div class="spinner"></div>
      <div id="loaderText" class="font-black text-[var(--primary)] text-sm">جاري المعالجة...</div>
    </div>
  </div>

  <main class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-md">
      <div class="text-center mb-6">
        <button onclick="goHome()" class="mb-5 inline-flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-sm border border-gray-100 text-gray-600 font-bold">
          <svg id="backIcon" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          <span id="backHomeText">العودة للرئيسية</span>
        </button>

        <div class="mx-auto w-24 h-24 rounded-full bg-white store-badge flex items-center justify-center p-3 mb-4">
          <img id="storeLogo" src="https://up6.cc/2026/03/17733402856661.png" class="w-full h-full object-contain" alt="store logo">
        </div>

        <h1 id="storeName" class="text-2xl font-black text-[var(--primary)]">Tofan Store</h1>
        <p id="pageSubtitle" class="text-gray-400 font-bold text-sm mt-1">تسجيل الدخول أو إنشاء حساب جديد</p>
      </div>

      <div class="glass-card rounded-[32px] p-5 md:p-6">
        <div class="grid grid-cols-2 gap-2 bg-white rounded-full p-1 border border-gray-100 mb-6">
          <button id="tabLoginBtn" class="tab-btn active" onclick="switchTab('login')">تسجيل الدخول</button>
          <button id="tabRegisterBtn" class="tab-btn inactive" onclick="switchTab('register')">إنشاء حساب</button>
        </div>

        <section id="loginSection" class="fade-in">
          <div class="mb-4">
            <label id="loginEmailLabel" class="field-label">البريد الإلكتروني</label>
            <div class="field-wrap">
              <input id="loginEmail" type="email" class="field-input" placeholder="example@email.com">
            </div>
          </div>

          <div class="mb-4">
            <label id="loginPasswordLabel" class="field-label">كلمة المرور</label>
            <div class="field-wrap">
              <input id="loginPassword" type="password" class="field-input" placeholder="********">
            </div>
          </div>

          <button id="loginBtn" onclick="handleLogin()" class="primary-btn mb-3">
            تسجيل الدخول
          </button>

          <button id="forgotBtn" onclick="handleForgotPassword()" class="secondary-btn mb-3">
            نسيت كلمة المرور
          </button>

          <button id="continueShoppingLoginBtn" onclick="goHome()" class="ghost-btn">
            متابعة التسوق
          </button>
        </section>

        <section id="registerSection" class="hidden fade-in">
          <div class="mb-4">
            <label id="registerNameLabel" class="field-label">الاسم الكامل</label>
            <div class="field-wrap">
              <input id="registerName" type="text" class="field-input" placeholder="اسمك الكامل">
            </div>
          </div>

          <div class="mb-4">
            <label id="registerEmailLabel" class="field-label">البريد الإلكتروني</label>
            <div class="field-wrap">
              <input id="registerEmail" type="email" class="field-input" placeholder="example@email.com">
            </div>
          </div>

          <div class="mb-5">
            <label id="registerPasswordLabel" class="field-label">كلمة المرور</label>
            <div class="field-wrap">
              <input id="registerPassword" type="password" class="field-input" placeholder="6 أحرف أو أكثر">
            </div>
          </div>

          <button id="registerBtn" onclick="handleRegister()" class="primary-btn mb-3">
            إنشاء الحساب
          </button>

          <button id="continueShoppingRegisterBtn" onclick="goHome()" class="ghost-btn">
            متابعة التسوق
          </button>
        </section>
      </div>
    </div>
  </main>

  <script>
    firebase.initializeApp(firebaseConfig1885);
    const rtdb1885 = firebase.database();
    const auth1885 = firebase.auth();

    const fallbackLogo = "https://up6.cc/2026/03/17733402856661.png";

    const LOCAL_KEYS = {
      lang: "tofan_lang_1885"
    };

    const i18n = {
      ar: {
        pageTitle: "تسجيل الدخول | Tofan Store",
        storeDefaultName: "Tofan Store",
        backHome: "العودة للرئيسية",
        subtitle: "تسجيل الدخول أو إنشاء حساب جديد",
        tabLogin: "تسجيل الدخول",
        tabRegister: "إنشاء حساب",
        email: "البريد الإلكتروني",
        password: "كلمة المرور",
        fullName: "الاسم الكامل",
        loginBtn: "تسجيل الدخول",
        forgotBtn: "نسيت كلمة المرور",
        continueShopping: "متابعة التسوق",
        registerBtn: "إنشاء الحساب",
        fullNamePlaceholder: "اسمك الكامل",
        passwordPlaceholder: "********",
        registerPasswordPlaceholder: "6 أحرف أو أكثر",
        processing: "جاري المعالجة...",
        invalidEmailLogin: "أدخل البريد بشكل صحيح",
        invalidPasswordLogin: "أدخل كلمة المرور بشكل صحيح",
        loginSuccess: "تم تسجيل الدخول بنجاح",
        wrongCredentials: "البريد أو كلمة المرور غير صحيحة",
        tooManyRequests: "تم تقييد المحاولات مؤقتاً، حاول لاحقاً",
        loginFailed: "تعذر تسجيل الدخول",
        enterFullName: "أدخل الاسم الكامل",
        invalidEmailRegister: "أدخل بريدًا صحيحًا",
        weakPasswordRegister: "كلمة المرور يجب أن تكون 6 أحرف أو أكثر",
        registerSuccess: "تم إنشاء الحساب بنجاح",
        emailExists: "هذا البريد مستخدم بالفعل",
        invalidEmail: "البريد غير صالح",
        weakPassword: "كلمة المرور ضعيفة",
        enableEmailPassword: "فعّل Email/Password من Firebase Authentication",
        registerFailed: "تعذر إنشاء الحساب",
        enterEmailFirst: "أدخل البريد أولاً",
        resetSent: "تم إرسال رابط إعادة تعيين كلمة المرور",
        userNotFound: "لا يوجد حساب بهذا البريد",
        resetFailed: "تعذر إرسال رابط الاستعادة"
      },
      en: {
        pageTitle: "Login | Tofan Store",
        storeDefaultName: "Tofan Store",
        backHome: "Back to home",
        subtitle: "Log in or create a new account",
        tabLogin: "Login",
        tabRegister: "Create Account",
        email: "Email",
        password: "Password",
        fullName: "Full Name",
        loginBtn: "Login",
        forgotBtn: "Forgot Password",
        continueShopping: "Continue Shopping",
        registerBtn: "Create Account",
        fullNamePlaceholder: "Your full name",
        passwordPlaceholder: "********",
        registerPasswordPlaceholder: "6 characters or more",
        processing: "Processing...",
        invalidEmailLogin: "Enter a valid email",
        invalidPasswordLogin: "Enter a valid password",
        loginSuccess: "Logged in successfully",
        wrongCredentials: "Incorrect email or password",
        tooManyRequests: "Too many attempts. Please try again later",
        loginFailed: "Unable to log in",
        enterFullName: "Enter your full name",
        invalidEmailRegister: "Enter a valid email",
        weakPasswordRegister: "Password must be at least 6 characters",
        registerSuccess: "Account created successfully",
        emailExists: "This email is already in use",
        invalidEmail: "Invalid email",
        weakPassword: "Weak password",
        enableEmailPassword: "Enable Email/Password in Firebase Authentication",
        registerFailed: "Unable to create account",
        enterEmailFirst: "Enter your email first",
        resetSent: "Password reset link has been sent",
        userNotFound: "No account found with this email",
        resetFailed: "Unable to send reset link"
      }
    };

    let currentLang = localStorage.getItem(LOCAL_KEYS.lang) || sessionStorage.getItem(LOCAL_KEYS.lang) || "ar";

    let storeSettings = {
      storeName: "Tofan Store",
      storeNameEn: "Tofan Store",
      storeLogoUrl: fallbackLogo
    };

    function tr(key){
      return i18n[currentLang]?.[key] || key;
    }

    function setPageLanguageAttrs(){
      document.documentElement.lang = currentLang === "ar" ? "ar" : "en";
      document.documentElement.dir = currentLang === "ar" ? "rtl" : "ltr";
      document.body.style.direction = currentLang === "ar" ? "rtl" : "ltr";

      const backIcon = document.getElementById("backIcon");
      if(backIcon){
        backIcon.innerHTML = currentLang === "ar"
          ? `<path stroke-width="2" d="M15 19l-7-7 7-7"/>`
          : `<path stroke-width="2" d="M9 5l7 7-7 7"/>`;
      }
    }

    function applyTranslations(){
      setPageLanguageAttrs();

      document.title = tr("pageTitle");
      document.getElementById("backHomeText").textContent = tr("backHome");
      document.getElementById("pageSubtitle").textContent = tr("subtitle");

      document.getElementById("tabLoginBtn").textContent = tr("tabLogin");
      document.getElementById("tabRegisterBtn").textContent = tr("tabRegister");

      document.getElementById("loginEmailLabel").textContent = tr("email");
      document.getElementById("loginPasswordLabel").textContent = tr("password");
      document.getElementById("registerNameLabel").textContent = tr("fullName");
      document.getElementById("registerEmailLabel").textContent = tr("email");
      document.getElementById("registerPasswordLabel").textContent = tr("password");

      document.getElementById("loginBtn").textContent = tr("loginBtn");
      document.getElementById("forgotBtn").textContent = tr("forgotBtn");
      document.getElementById("continueShoppingLoginBtn").textContent = tr("continueShopping");
      document.getElementById("registerBtn").textContent = tr("registerBtn");
      document.getElementById("continueShoppingRegisterBtn").textContent = tr("continueShopping");

      document.getElementById("loginPassword").placeholder = tr("passwordPlaceholder");
      document.getElementById("registerName").placeholder = tr("fullNamePlaceholder");
      document.getElementById("registerPassword").placeholder = tr("registerPasswordPlaceholder");
      document.getElementById("loaderText").textContent = tr("processing");

      updateStoreTexts();
    }

    function updateStoreTexts(){
      const storeName = currentLang === "ar"
        ? (storeSettings.storeName || storeSettings.storeNameEn || tr("storeDefaultName"))
        : (storeSettings.storeNameEn || storeSettings.storeName || tr("storeDefaultName"));

      document.getElementById("storeName").textContent = storeName;
    }

    function setLoadingBar(on){
      const el = document.getElementById("topLoading");
      if(on){
        el.style.width = "68%";
      }else{
        el.style.width = "100%";
        setTimeout(() => el.style.width = "0%", 260);
      }
    }

    function setOverlayLoading(on){
      const el = document.getElementById("loaderOverlay");
      el.style.display = on ? "flex" : "none";
    }

    function showToast(msg){
      const old = document.querySelector(".toast");
      if(old) old.remove();

      const t = document.createElement("div");
      t.className = "toast";
      t.textContent = msg;
      document.body.appendChild(t);

      setTimeout(() => {
        t.style.opacity = "0";
        t.style.transform = "translate(-50%,16px)";
        setTimeout(() => t.remove(), 220);
      }, 2500);
    }

    function goHome(){
      window.location.href = "index.html";
    }

    function switchTab(tab){
      const loginSection = document.getElementById("loginSection");
      const registerSection = document.getElementById("registerSection");
      const tabLoginBtn = document.getElementById("tabLoginBtn");
      const tabRegisterBtn = document.getElementById("tabRegisterBtn");

      if(tab === "register"){
        loginSection.classList.add("hidden");
        registerSection.classList.remove("hidden");
        tabLoginBtn.className = "tab-btn inactive";
        tabRegisterBtn.className = "tab-btn active";
      }else{
        registerSection.classList.add("hidden");
        loginSection.classList.remove("hidden");
        tabRegisterBtn.className = "tab-btn inactive";
        tabLoginBtn.className = "tab-btn active";
      }
    }

    function normalizeUsername(value){
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/\s+/g, "_")
        .replace(/[^a-z0-9_\u0600-\u06FF]/g, "");
    }

    function randomUsernameFromName(name){
      const base = normalizeUsername(name || "user") || "user";
      return `${base}_${Math.random().toString(36).slice(2,7)}`;
    }

    async function loadStoreSettings(){
      try{
        const snap = await rtdb1885.ref(FIREBASE_PATHS_1885.settingsStore).get();
        const data = snap.val() || {};

        storeSettings = {
          storeName: data.storeName || data.storeNameAr || "Tofan Store",
          storeNameEn: data.storeNameEn || data.storeName || "Tofan Store",
          storeLogoUrl: data.storeLogoUrl || fallbackLogo
        };

        updateStoreTexts();
        document.getElementById("storeLogo").src = storeSettings.storeLogoUrl;
      }catch(e){
        updateStoreTexts();
        document.getElementById("storeLogo").src = fallbackLogo;
      }
    }

    async function ensureUserProfile(user){
      if(!user) return null;

      const ref = rtdb1885.ref(`${FIREBASE_PATHS_1885.users}/${user.uid}`);
      const snap = await ref.get();
      const oldData = snap.val() || null;

      if(oldData){
        await ref.update({
          uid: user.uid,
          email: user.email || oldData.email || "",
          displayName: user.displayName || oldData.displayName || "",
          updatedAt: Date.now()
        });
        return { ...oldData, uid: user.uid };
      }

      const newProfile = {
        uid: user.uid,
        email: user.email || "",
        displayName: user.displayName || "",
        username: randomUsernameFromName(user.displayName || "user"),
        role: "user",
        verified: false,
        createdAt: Date.now(),
        updatedAt: Date.now()
      };

      await ref.set(newProfile);
      return newProfile;
    }

    async function handleLogin(){
      const email = (document.getElementById("loginEmail").value || "").trim().toLowerCase();
      const password = (document.getElementById("loginPassword").value || "").trim();

      if(!email || !email.includes("@")){
        showToast(tr("invalidEmailLogin"));
        return;
      }

      if(password.length < 6){
        showToast(tr("invalidPasswordLogin"));
        return;
      }

      setOverlayLoading(true);

      try{
        await auth1885.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        const cred = await auth1885.signInWithEmailAndPassword(email, password);
        await ensureUserProfile(cred.user);

        showToast(tr("loginSuccess"));

        setTimeout(() => {
          const redirect = sessionStorage.getItem("login_redirect_1885");
          if(redirect){
            sessionStorage.removeItem("login_redirect_1885");
            window.location.href = redirect;
          }else{
            window.location.href = "index.html";
          }
        }, 600);
      }catch(e){
        console.error(e);

        if(
          e.code === "auth/user-not-found" ||
          e.code === "auth/wrong-password" ||
          e.code === "auth/invalid-credential" ||
          e.code === "auth/invalid-login-credentials"
        ){
          showToast(tr("wrongCredentials"));
        }else if(e.code === "auth/too-many-requests"){
          showToast(tr("tooManyRequests"));
        }else{
          showToast(tr("loginFailed"));
        }
      }finally{
        setOverlayLoading(false);
      }
    }

    async function handleRegister(){
      const displayName = (document.getElementById("registerName").value || "").trim();
      const email = (document.getElementById("registerEmail").value || "").trim().toLowerCase();
      const password = (document.getElementById("registerPassword").value || "").trim();

      if(displayName.length < 2){
        showToast(tr("enterFullName"));
        return;
      }

      if(!email || !email.includes("@")){
        showToast(tr("invalidEmailRegister"));
        return;
      }

      if(password.length < 6){
        showToast(tr("weakPasswordRegister"));
        return;
      }

      setOverlayLoading(true);

      try{
        await auth1885.setPersistence(firebase.auth.Auth.Persistence.LOCAL);
        const cred = await auth1885.createUserWithEmailAndPassword(email, password);

        try{
          await cred.user.updateProfile({ displayName });
        }catch(err){}

        await rtdb1885.ref(`${FIREBASE_PATHS_1885.users}/${cred.user.uid}`).set({
          uid: cred.user.uid,
          email,
          displayName,
          username: randomUsernameFromName(displayName),
          role: "user",
          verified: false,
          createdAt: Date.now(),
          updatedAt: Date.now()
        });

        showToast(tr("registerSuccess"));

        setTimeout(() => {
          const redirect = sessionStorage.getItem("login_redirect_1885");
          if(redirect){
            sessionStorage.removeItem("login_redirect_1885");
            window.location.href = redirect;
          }else{
            window.location.href = "index.html";
          }
        }, 700);
      }catch(e){
        console.error(e);

        if(e.code === "auth/email-already-in-use"){
          showToast(tr("emailExists"));
        }else if(e.code === "auth/invalid-email"){
          showToast(tr("invalidEmail"));
        }else if(e.code === "auth/weak-password"){
          showToast(tr("weakPassword"));
        }else if(e.code === "auth/operation-not-allowed"){
          showToast(tr("enableEmailPassword"));
        }else{
          showToast(tr("registerFailed"));
        }
      }finally{
        setOverlayLoading(false);
      }
    }

    async function handleForgotPassword(){
      const email = (document.getElementById("loginEmail").value || "").trim().toLowerCase();

      if(!email || !email.includes("@")){
        showToast(tr("enterEmailFirst"));
        return;
      }

      setOverlayLoading(true);

      try{
        await auth1885.sendPasswordResetEmail(email);
        showToast(tr("resetSent"));
      }catch(e){
        console.error(e);

        if(e.code === "auth/user-not-found"){
          showToast(tr("userNotFound"));
        }else if(e.code === "auth/invalid-email"){
          showToast(tr("invalidEmail"));
        }else{
          showToast(tr("resetFailed"));
        }
      }finally{
        setOverlayLoading(false);
      }
    }

    async function bootPage(){
      setLoadingBar(true);
      try{
        applyTranslations();
        await loadStoreSettings();

        auth1885.onAuthStateChanged((user) => {
          if(user){
            const redirect = sessionStorage.getItem("login_redirect_1885");
            if(redirect){
              sessionStorage.removeItem("login_redirect_1885");
              window.location.href = redirect;
            }
          }
        });
      }catch(e){
        console.error(e);
      }finally{
        setLoadingBar(false);
      }
    }

    window.addEventListener("load", bootPage);
  </script>
</body>
</html>
