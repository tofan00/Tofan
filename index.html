<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tofan Store | متجر طوفان</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

  <link id="siteFavicon" rel="icon" type="image/png" href="https://up6.cc/2026/03/17733402856661.png">

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="firebase-config.js"></script>

  <style>
    :root{
      --primary:#14454d;
      --accent:#f37021;
      --soft:#f3f6f8;
      --line:#e8edf2;
      --gold:#f6b900;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      font-family:'Cairo',sans-serif;
      background:#f7f8fa;
      overflow-x:hidden;
      color:#1f2937;
      -webkit-tap-highlight-color:transparent;
      text-rendering:optimizeLegibility;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    .hidden-scrollbar::-webkit-scrollbar{display:none}
    .hidden-scrollbar{scrollbar-width:none}

    .top-loading{
      position:fixed;
      top:0;
      right:0;
      height:3px;
      width:0;
      background:linear-gradient(90deg,var(--primary),var(--accent));
      z-index:9999;
      transition:width .3s ease;
    }

    .overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.45);
      display:none;
      z-index:2100;
      backdrop-filter:blur(3px);
    }

    .sidebar{
      position:fixed;
      top:0;
      right:0;
      width:290px;
      height:100%;
      background:#fff;
      z-index:2200;
      transform:translate3d(100%,0,0);
      transition:transform .18s cubic-bezier(.2,.8,.2,1);
      box-shadow:-10px 0 30px rgba(0,0,0,.12);
      overflow-y:auto;
      overflow-x:hidden;
      will-change:transform;
      backface-visibility:hidden;
      direction:inherit;
      visibility:visible;
      opacity:1;
      contain:layout paint style;
    }
    html[dir="ltr"] .sidebar{
      right:auto;
      left:0;
      transform:translate3d(-100%,0,0);
      box-shadow:10px 0 30px rgba(0,0,0,.12);
      text-align:left;
    }
    .sidebar.open{transform:translate3d(0,0,0)!important}

    .top-pane{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:76%;
      background:#fff;
      z-index:2150;
      border-radius:0 0 24px 24px;
      box-shadow:0 10px 30px rgba(0,0,0,.12);
      transform:translate3d(0,-105%,0);
      transition:transform .18s cubic-bezier(.2,.8,.2,1);
      will-change:transform;
      backface-visibility:hidden;
    }
    .top-pane.active{transform:translate3d(0,0,0)}

    .bottom-pane{
      position:fixed;
      bottom:0;
      left:0;
      width:100%;
      height:80%;
      background:#fff;
      z-index:2150;
      border-radius:24px 24px 0 0;
      box-shadow:0 -10px 30px rgba(0,0,0,.12);
      transform:translate3d(0,105%,0);
      transition:transform .18s cubic-bezier(.2,.8,.2,1);
      will-change:transform;
      backface-visibility:hidden;
    }
    .bottom-pane.active{transform:translate3d(0,0,0)}

    .sheet-layout{
      height:100%;
      display:flex;
      flex-direction:column;
    }

    .sheet-scroll{
      flex:1;
      min-height:0;
      overflow-y:auto;
    }

    .popup-sheet{
      position:fixed;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%) scale(.96);
      width:min(92vw,680px);
      max-height:80vh;
      overflow:auto;
      background:#fff;
      border-radius:24px;
      box-shadow:0 20px 60px rgba(0,0,0,.18);
      z-index:2300;
      opacity:0;
      pointer-events:none;
      transition:.16s ease;
      will-change:transform,opacity;
    }
    .popup-sheet.active{
      opacity:1;
      pointer-events:auto;
      transform:translate(-50%,-50%) scale(1);
    }

    .badge{
      position:absolute;
      top:-5px;
      right:-5px;
      background:var(--accent);
      color:#fff;
      font-size:10px;
      width:18px;
      height:18px;
      border-radius:999px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      border:2px solid #fff;
    }
    html[dir="ltr"] .badge{right:auto;left:-5px}

    .header{
      background:#fff;
      position:sticky;
      top:0;
      z-index:1900;
      box-shadow:0 1px 10px rgba(0,0,0,.04);
      padding:10px 14px;
    }

    .header-row{
      position:relative;
      display:flex;
      align-items:center;
      justify-content:space-between;
      min-height:42px;
    }

    .header-left,
    .header-right{
      display:flex;
      align-items:center;
      gap:12px;
      z-index:3;
      min-width:82px;
      transition:transform .2s ease;
    }

    .header-center{
      position:absolute;
      left:50%;
      transform:translateX(-50%);
      z-index:2;
      pointer-events:none;
    }

    .header-logo-shell{
      position:relative;
      width:94px;
      height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:visible;
    }
    .header-center img{
      height:42px;
      max-width:118px;
      object-fit:contain;
      display:block;
      opacity:0;
      transition:opacity .22s ease;
    }
    .header-center img.logo-loaded{opacity:1}

    .sidebar-logo-shell{
      position:relative;
      width:40px;
      height:40px;
      border-radius:12px;
      overflow:hidden;
      flex:0 0 40px;
      background:#fff;
    }
    .sidebar-logo-shell img{
      width:100%;
      height:100%;
      object-fit:contain;
      opacity:0;
      transition:opacity .22s ease;
    }
    .sidebar-logo-shell img.logo-loaded{opacity:1}

    .icon-btn{
      background:transparent;
      border:none;
      padding:0;
      margin:0;
      display:flex;
      align-items:center;
      justify-content:center;
      cursor:pointer;
    }

    .lang-btn{
      background:#f3f4f6;
      border:none;
      border-radius:10px;
      padding:5px 10px;
      font-size:12px;
      font-weight:800;
      color:#4b5563;
      cursor:pointer;
    }

    .search-results-box{
      background:#fff;
      border:1px solid #e5e7eb;
      border-radius:18px;
      box-shadow:0 10px 28px rgba(0,0,0,.08);
      padding:10px;
      margin-top:10px;
      display:none;
      position:relative;
      z-index:1800;
    }

    .search-dropdown{
      background:#fff;
      border-bottom:1px solid #eef2f6;
      box-shadow:0 8px 24px rgba(0,0,0,.05);
      max-height:0;
      overflow:hidden;
      opacity:0;
      transition:max-height .2s ease, opacity .16s ease, padding .16s ease;
      padding:0 14px;
    }
    .search-dropdown.open{
      max-height:230px;
      opacity:1;
      padding:10px 14px 12px;
    }

    .search-input{
      width:100%;
      height:42px;
      border:none;
      outline:none;
      background:#f3f4f6;
      border-radius:999px;
      padding:0 14px;
      font-size:13px;
      font-weight:800;
      color:#111827;
    }

    .hero-wrap,
    .extra-banner-wrap{
      position:relative;
      overflow:hidden;
      background:#eef2f7;
      min-height:160px;
    }
    .hero-wrap img,
    .extra-banner-wrap img{
      width:100%;
      display:block;
      object-fit:cover;
      opacity:0;
      transition:opacity .24s ease;
    }
    .hero-wrap img.media-loaded,
    .extra-banner-wrap img.media-loaded{
      opacity:1;
    }

    .section-title-line{
      height:1px;
      background:#e5e7eb;
      flex:1;
    }

    .catSwiper{
      overflow:visible;
      position:relative;
      z-index:5;
    }

    .catSwiper .swiper-wrapper,
    .catSwiper .swiper-slide{
      overflow:visible !important;
    }

    .cat-card{
      position:relative;
      z-index:6;
      outline:none;
    }

    .cat-icon-wrapper{
      width:76px;
      height:76px;
      background:#fff;
      border:1px solid #eef2f6;
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--primary);
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease, background-color .18s ease;
      box-shadow:0 4px 12px rgba(0,0,0,.03);
      overflow:hidden;
      will-change:transform;
      position:relative;
      flex:0 0 76px;
      contain:layout paint style;
    }
    .cat-icon-wrapper img{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      opacity:0;
      transition:opacity .22s ease;
      transform:translateZ(0);
    }
    .cat-icon-wrapper img.media-loaded{opacity:1}

    .cat-card:hover .cat-icon-wrapper,
    .cat-card:focus-visible .cat-icon-wrapper,
    .cat-card:active .cat-icon-wrapper{
      background:#fff;
      color:var(--primary);
      border-color:var(--primary);
      box-shadow:0 0 0 2px rgba(20,69,77,.18);
      transform:translateX(-5px);
    }
    html[dir="ltr"] .cat-card:hover .cat-icon-wrapper,
    html[dir="ltr"] .cat-card:focus-visible .cat-icon-wrapper,
    html[dir="ltr"] .cat-card:active .cat-icon-wrapper{
      transform:translateX(5px);
    }

    .cat-image-fade,
    .soft-image-fade{
      position:absolute;
      inset:0;
      background:#eef2f6;
      opacity:1;
      transition:opacity .22s ease;
      pointer-events:none;
    }
    .cat-image-fade.hidden,
    .soft-image-fade.hidden{opacity:0}

    .swiper-pagination-bullet{
      width:18px !important;
      height:4px !important;
      border-radius:999px !important;
      background:#cbd5e1 !important;
      opacity:1 !important;
      transition:.22s ease !important;
    }
    .swiper-pagination-bullet-active{
      width:34px !important;
      background:var(--primary) !important;
    }

    .rounded-banner{
      overflow:hidden;
      background:#fff;
      border:none;
      border-radius:0;
      box-shadow:none;
    }

    .product-card{
      background:#fff;
      border:1px solid #eef2f6;
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 6px 18px rgba(0,0,0,.04);
      transition:transform .18s ease, box-shadow .18s ease, opacity .22s ease;
      position:relative;
      opacity:0;
      transform:translateY(20px);
      will-change:transform,opacity;
      backface-visibility:hidden;
      cursor:pointer;
      contain:layout paint style;
      content-visibility:auto;
      contain-intrinsic-size:380px;
    }
    .product-card.visible{
      opacity:1;
      transform:translateY(0);
    }
    .product-card:hover{
      transform:translateY(-4px);
      box-shadow:0 16px 30px rgba(0,0,0,.08);
    }

    .img-container{
      position:relative;
      aspect-ratio:1/1.08;
      overflow:hidden;
      background:#f3f4f6;
    }
    .img-container img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      opacity:0;
      transition:opacity .24s ease, transform .24s ease;
      transform:translateZ(0);
    }
    .img-container img.media-loaded{opacity:1}

    .front-img,.back-img{
      position:absolute;
      inset:0;
      will-change:opacity,transform;
      backface-visibility:hidden;
    }
    .back-img{
      opacity:0;
      transform:scale(1.02);
    }
    .img-container .front-img.media-loaded{opacity:1}
    .img-container .back-img.media-loaded{opacity:0}

    @media (hover:hover){
      .product-card:hover .back-img.media-loaded{
        opacity:1;
        transform:scale(1);
      }
      .product-card:hover .front-img.media-loaded{
        opacity:0;
      }
    }

    .product-card.touch-active .back-img.media-loaded{
      opacity:1;
      transform:scale(1);
    }
    .product-card.touch-active .front-img.media-loaded{
      opacity:0;
    }

    .product-image-loader,
    .banner-image-loader,
    .logo-image-loader{
      position:absolute;
      inset:0;
      background:#eef2f6;
      opacity:1;
      transition:opacity .22s ease;
      z-index:2;
      pointer-events:none;
    }
    .product-image-loader.hidden,
    .banner-image-loader.hidden,
    .logo-image-loader.hidden{
      opacity:0;
    }

    .wish-btn{
      position:absolute;
      top:10px;
      right:10px;
      width:36px;
      height:36px;
      border-radius:999px;
      background:rgba(255,255,255,.92);
      backdrop-filter:blur(6px);
      box-shadow:0 6px 16px rgba(0,0,0,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:4;
      border:none;
      cursor:pointer;
    }
    html[dir="ltr"] .wish-btn{
      right:auto;
      left:10px;
    }

    .discount-badge{
      position:absolute;
      top:10px;
      left:10px;
      min-width:54px;
      height:28px;
      padding:0 12px;
      border-radius:999px;
      background:var(--accent);
      color:#fff;
      z-index:4;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:900;
      box-shadow:0 6px 16px rgba(243,112,33,.26);
    }
    html[dir="ltr"] .discount-badge{
      left:auto;
      right:10px;
    }

    .hollow-cart-btn{
      width:100%;
      height:42px;
      border-radius:15px;
      display:flex;
      align-items:center;
      justify-content:center;
      transition:.18s ease;
      cursor:pointer;
      font-weight:800;
      border:2px solid var(--primary);
      color:var(--primary);
      background:transparent;
    }

    .empty-box{
      background:#fff;
      border:1px dashed #dbe3eb;
      border-radius:24px;
      padding:24px;
      text-align:center;
      color:#94a3b8;
      font-weight:700;
    }

    .dashed-sep{border-top:1px dashed #d1d5db}

    .auth-chip{
      background:#f8fafc;
      border:1px solid #e5e7eb;
      border-radius:999px;
      padding:10px 14px;
      font-size:12px;
      font-weight:800;
      display:flex;
      align-items:center;
      gap:8px;
      cursor:pointer;
      transition:.18s ease;
      width:100%;
      justify-content:space-between;
      color:#334155;
    }
    html[dir="ltr"] .auth-chip{text-align:left}

    .bottom-nav{
      position:fixed;
      bottom:0;
      width:100%;
      background:rgba(255,255,255,.95);
      backdrop-filter:blur(10px);
      border-top:1px solid #edf2f7;
      display:flex;
      justify-content:space-around;
      padding:12px 6px calc(12px + env(safe-area-inset-bottom));
      z-index:2000;
      box-shadow:0 -8px 24px rgba(0,0,0,.06);
    }

    .cart-item-check{
      width:18px;
      height:18px;
      accent-color:var(--primary);
    }

    .cart-checkout-bar{
      position:sticky;
      bottom:0;
      left:0;
      width:100%;
      padding:12px 0 calc(10px + env(safe-area-inset-bottom));
      background:#fff;
      border-top:1px solid #eef2f6;
      margin-top:10px;
      z-index:3;
    }

    .primary-btn,.secondary-btn{
      width:100%;
      border-radius:16px;
      padding:13px 16px;
      font-weight:900;
      cursor:pointer;
      border:none;
    }
    .primary-btn{
      background:var(--primary);
      color:#fff;
      box-shadow:0 10px 22px rgba(20,69,77,.18);
    }
    .secondary-btn{
      background:#f8fafc;
      color:#334155;
      border:1px solid #e5e7eb;
    }

    .toast{
      position:fixed;
      bottom:90px;
      left:50%;
      transform:translateX(-50%);
      background:#111827;
      color:#fff;
      border-radius:999px;
      padding:12px 18px;
      z-index:9999;
      font-size:13px;
      font-weight:800;
      animation:toastUp .14s ease;
      white-space:nowrap;
      max-width:90%;
      overflow:hidden;
      text-overflow:ellipsis;
      will-change:transform,opacity;
    }

    .section-slider{position:relative}
    .section-slider .swiper-button-prev,
    .section-slider .swiper-button-next{
      width:36px;
      height:36px;
      border-radius:999px;
      background:rgba(17,24,39,.8);
      color:#fff;
    }
    .section-slider .swiper-button-prev:after,
    .section-slider .swiper-button-next:after{
      font-size:13px;
      font-weight:900;
    }

    .hero-hidden{display:none !important}

    .price-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:4px;
      margin-bottom:8px;
      flex-wrap:wrap;
    }
    .old-price{
      font-size:13px;
      color:#b9c0c8;
      text-decoration:line-through;
      font-weight:800;
    }
    .new-price{
      font-size:16px;
      color:var(--primary);
      font-weight:900;
    }

    .store-footer{
      margin:30px 16px 0;
      background:#fff;
      border:1px solid #e9eef3;
      border-radius:28px;
      box-shadow:0 10px 30px rgba(0,0,0,.04);
      overflow:hidden;
      content-visibility:auto;
      contain-intrinsic-size:400px;
    }

    .footer-head{
      padding:22px 18px 10px;
      text-align:center;
    }

    .footer-title{
      color:var(--primary);
      font-size:20px;
      font-weight:900;
      margin-bottom:6px;
    }

    .footer-sub{
      color:#94a3b8;
      font-size:12px;
      font-weight:800;
    }

    .footer-section{
      padding:18px;
      border-top:1px solid #eef2f6;
    }

    .footer-section-title{
      font-size:14px;
      font-weight:900;
      color:var(--primary);
      margin-bottom:14px;
      text-align:center;
    }

    .social-grid{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
    }

    .social-link{
      width:50px;
      height:50px;
      border-radius:16px;
      border:1px solid #e7edf3;
      background:#f8fafc;
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--primary);
      transition:.18s ease;
      box-shadow:0 4px 12px rgba(0,0,0,.03);
    }
    .social-link:hover{
      transform:translateY(-2px);
      background:var(--primary);
      color:#fff;
      border-color:var(--primary);
    }

    .payment-icons-grid{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      justify-content:center;
      align-items:center;
    }

    .payment-icon-card{
      background:#fff;
      border:1px solid #e9eef3;
      border-radius:18px;
      padding:12px 16px;
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:64px;
      min-width:120px;
    }
    .payment-icon-card img{
      max-width:100%;
      max-height:36px;
      object-fit:contain;
      display:block;
    }

    .footer-copy{
      text-align:center;
      color:#94a3b8;
      font-size:12px;
      font-weight:800;
      padding:16px 18px 20px;
      border-top:1px solid #eef2f6;
      background:#fbfcfd;
    }

    .desktop-products-grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:16px;
    }

    .reviews-section{
      margin:30px 16px 0;
      background:#fff;
      border:1px solid #e9eef3;
      border-radius:28px;
      box-shadow:0 10px 30px rgba(0,0,0,.04);
      overflow:hidden;
      padding:22px 16px 20px;
      content-visibility:auto;
      contain-intrinsic-size:320px;
    }

    .reviews-header{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:18px;
      margin-bottom:18px;
    }

    .reviews-header-line{
      width:48px;
      height:1px;
      background:#d7dee6;
    }

    .reviews-title{
      font-size:24px;
      font-weight:900;
      color:var(--primary);
      line-height:1;
    }

    .reviews-swiper{
      overflow:hidden;
      padding:6px 2px 2px;
    }

    .review-card{
      background:linear-gradient(135deg,#2d7a87 0%, #14454d 100%);
      color:#fff;
      border-radius:22px;
      padding:20px 16px;
      box-shadow:0 12px 30px rgba(20,69,77,.20);
      min-height:210px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      text-align:center;
    }

    .review-stars{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:4px;
      margin-bottom:12px;
    }

    .review-stars svg{
      width:18px;
      height:18px;
      fill:var(--gold);
      flex:0 0 18px;
    }

    .review-text{
      font-size:14px;
      font-weight:700;
      line-height:2;
      color:#f8fbfc;
      min-height:84px;
      display:flex;

        .replaceAll("&","&amp;")
        .replaceAll("<","&lt;")
        .replaceAll(">","&gt;")
        .replaceAll('"',"&quot;")
        .replaceAll("'","&#039;");
    }

    function normalizeCategories(raw){
      return Object.entries(raw || {}).map(([id, v]) => ({
        id,
        nameAr: v.nameAr || v.name || "",
        nameEn: v.nameEn || "",
        image: v.image || "",
        icon: v.icon || "box",
        order: Number(v.order || 0),
        enabled: v.enabled !== false
      })).sort((a,b) => a.order - b.order);
    }

    function normalizeProducts(raw){
      return Object.entries(raw || {}).map(([id, v]) => ({
        id,
        categoryId: v.categoryId || v.category || "",
        nameAr: v.nameAr || v.name || "",
        nameEn: v.nameEn || "",
        descAr: v.descAr || v.desc || "",
        descEn: v.descEn || "",
        price: Number(v.price || 0),
        oldPrice: Number(v.oldPrice || 0),
        image1: v.image1 || v.image || v.front || "",
        image2: v.image2 || "",
        images: Array.isArray(v.images) ? v.images : [],
        colorOptions: Array.isArray(v.colorOptions) ? v.colorOptions : [],
        order: Number(v.order || 0),
        enabled: v.enabled !== false,
        createdAt: Number(v.createdAt || 0)
      })).filter(p => p.enabled).sort((a,b) => (a.order - b.order) || (b.createdAt - a.createdAt));
    }

    function normalizeSections(raw){
      return Object.entries(raw || {}).map(([id, v]) => ({
        id,
        type: v.type || "banner",
        titleAr: v.titleAr || v.title || "",
        titleEn: v.titleEn || "",
        image: v.image || "",
        images: Array.isArray(v.images) ? v.images : [],
        link: v.link || "#",
        placement: v.placement || "after_categories",
        order: Number(v.order || 0),
        enabled: v.enabled !== false
      })).filter(s => s.enabled).sort((a,b) => a.order - b.order);
    }

    function normalizeMenuItems(raw){
      return Object.entries(raw || {}).map(([id, v]) => ({
        id,
        titleAr: v.titleAr || v.title || "",
        titleEn: v.titleEn || "",
        type: v.type || "link",
        value: v.value || "",
        popupHtml: v.popupHtml || "",
        order: Number(v.order || 0),
        enabled: v.enabled !== false
      })).filter(i => i.enabled).sort((a,b) => a.order - b.order);
    }

    function normalizePaymentMethods(raw){
      return Object.entries(raw || {}).map(([id, v]) => ({
        id,
        name: v.name || "",
        image: v.image || "",
        enabled: v.enabled !== false,
        order: Number(v.order || 0)
      })).filter(x => x.enabled && x.image).sort((a,b) => a.order - b.order);
    }

    function normalizeSocialLinks(raw){
      return Object.entries(raw || {}).map(([id, v]) => ({
        id,
        platform: String(v.platform || "").toLowerCase().trim(),
        url: v.url || v.link || "",
        enabled: v.enabled !== false,
        order: Number(v.order || 0)
      })).filter(x => x.enabled && x.platform && x.url).sort((a,b) => a.order - b.order);
    }

    function preloadImage(url){
      return new Promise((resolve) => {
        if(!url){ resolve(false); return; }
        const img = new Image();
        img.decoding = "async";
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url;
      });
    }

    async function preloadCriticalAssets(){
      const catImages = categories
        .filter(c => c.enabled !== false && c.image)
        .map(c => c.image);

      const critical = [
        storeSettings.storeLogoUrl || fallbackLogo,
        storeSettings.bannerTopBannerUrl || storeSettings.bannerTopUrl || "",
        ...catImages
      ].filter(Boolean);

      if(!critical.length) return;
      await Promise.allSettled(critical.map(preloadImage));
    }

    function closeSearchBar(){
      document.getElementById("searchDropdown").classList.remove("open");
      document.getElementById("searchInput").value = "";
      document.getElementById("searchResultsBox").style.display = "none";
      document.getElementById("searchResultsBox").innerHTML = "";
    }

    function toggleSearchBar(event){
      if(event) event.stopPropagation();
      const box = document.getElementById("searchDropdown");
      const isOpen = box.classList.contains("open");
      if(isOpen){
        closeSearchBar();
      }else{
        closeAll(false);
        box.classList.add("open");
        setTimeout(() => document.getElementById("searchInput").focus(), 80);
      }
    }

    document.addEventListener("click", function(e){
      const header = document.getElementById("siteHeader");
      const search = document.getElementById("searchDropdown");
      if(!header.contains(e.target) && !search.contains(e.target)){
        closeSearchBar();
      }
    });

      document.getElementById("menuPopup").classList.add("active");

    function closeAll(closeSearchToo = true){
      document.getElementById("sidebar-menu").classList.remove("open");
      document.querySelectorAll(".top-pane, .bottom-pane").forEach(p => p.classList.remove("active"));
      const extra = document.getElementById("category-all-pane");
      if(extra) extra.classList.remove("active");
      closeMenuPopup();
      document.getElementById("overlay").style.display = "none";

    function setImgWithLoader(imgId, loaderId, url, fallback = fallbackLogo){
      const img = document.getElementById(imgId);
      const loader = document.getElementById(loaderId);
      if(!img || !loader) return;

      img.classList.remove("logo-loaded");
      loader.classList.remove("hidden");

      img.onload = () => {
        loader.classList.add("hidden");
        img.classList.add("logo-loaded");
      };

      img.onerror = () => {
        if (img.src !== fallback) {
          img.src = fallback;
        } else {
          loader.classList.add("hidden");
          img.classList.add("logo-loaded");
        }
      };

      img.src = url || fallback;
    }

    function updateStoreUI(){
      const logo = storeSettings.storeLogoUrl || fallbackLogo;
      const banner = storeSettings.bannerTopBannerUrl || storeSettings.bannerTopUrl || "";
      const name = lang === "ar"
        ? (storeSettings.storeName || "متجر طوفان")
        : (storeSettings.storeNameEn || storeSettings.storeName || "Tofan Store");

      setImgWithLoader("headerLogo", "headerLogoLoader", logo, fallbackLogo);
      setImgWithLoader("sidebarLogo", "sidebarLogoLoader", logo, fallbackLogo);

      const favicon = document.getElementById("siteFavicon");
      if(favicon){
        favicon.href = logo || fallbackLogo;
      }

      document.getElementById("sidebarStoreName").textContent = name;
      document.getElementById("footerStoreTitle").textContent = name;
      document.getElementById("footerStoreSub").textContent = t("footer-sub");
      document.getElementById("socialFooterTitle").textContent = t("follow-us");
      document.getElementById("paymentFooterTitle").textContent = t("payment-methods");
      document.getElementById("footerCopyText").textContent = `${t("rights")} - ${name}`;
      document.getElementById("reviewsTitle").textContent = t("reviews-title");

      const heroSection = document.getElementById("heroSection");
      const topBanner = document.getElementById("topBanner");
      const topBannerLoader = document.getElementById("topBannerLoader");

      if(banner){
        heroSection.classList.remove("hero-hidden");
        topBannerLoader.classList.remove("hidden");
        topBanner.onload = hideBannerLoader;
        topBanner.onerror = hideBannerLoader;
        topBanner.src = banner;
      }else{
        heroSection.classList.add("hero-hidden");
        topBanner.removeAttribute("src");
      }
    }

    function getDiscountPercent(price, oldPrice){
      const p = Number(price || 0);
      const o = Number(oldPrice || 0);
      if(!(o > p && p > 0)) return 0;
      return Math.round(((o - p) / o) * 100);
    }

    function handleMenuItemClick(id){
      const item = menuItems.find(x => x.id === id);
      if(!item) return;

      closeAll();

      if(item.type === "link"){
        if(/^https?:\/\//i.test(item.value)){
          window.open(item.value, "_blank");
        }else{
          window.location.href = item.value || "#";
        }
        return;
      }

      if(item.type === "internal_page"){
        window.location.href = item.value || "index.html";
        return;
      }

      if(item.type === "category"){
        setTimeout(() => scrollToCategorySection(item.value), 120);
        return;
      }

      if(item.type === "popup_html"){
        document.getElementById("overlay").style.display = "block";
        openMenuPopup(getMenuTitle(item), item.popupHtml || "");
      }
    }

    function renderSidebarDynamicMenu(){
      const wrap = document.getElementById("sidebarDynamicMenuWrap");
      if(!menuItems.length){
        wrap.innerHTML = "";
        return;
      }

      wrap.innerHTML = `
        <div class="space-y-3">
          ${menuItems.map(item => `
            <button class="auth-chip" onclick="handleMenuItemClick('${item.id}')">
              <span class="truncate">${escapeHtml(getMenuTitle(item))}</span>
              <span class="text-gray-400 text-xs font-bold">فتح</span>
            </button>
          `).join("")}
        </div>
      `;
    }

      }

    function initDynamicSwipers(){
      dynamicSwipers.forEach(sw => { try{ sw.destroy(true, true); }catch(e){} });
      dynamicSwipers = [];

      document.querySelectorAll(".section-slider .swiper").forEach(swEl => {
        dynamicSwipers.push(new Swiper(swEl, {
          loop: true,
          speed: 500,
          autoplay: { delay: 2500, disableOnInteraction: false },
          pagination: { el: swEl.querySelector(".swiper-pagination"), clickable: true },
          navigation: { nextEl: swEl.querySelector(".swiper-button-next"), prevEl: swEl.querySelector(".swiper-button-prev") },
          observer: true,
          observeParents: true,
          preloadImages: false,
          on: {
            init(sw){
              const actives = sw.slides;
              actives.forEach(slide => {
                slide.querySelectorAll("img.lazy-media").forEach(loadLazyMediaNow);
              });
            },
            slideChangeTransitionStart(sw){
              const active = sw.slides[sw.activeIndex];
              const next = sw.slides[sw.activeIndex + 1];
              const prev = sw.slides[sw.activeIndex - 1];
              [active, next, prev].forEach(slide => {
                if(slide){
                  slide.querySelectorAll("img.lazy-media").forEach(loadLazyMediaNow);
                }
              });
            }
          }
        }));
      });
    }

    function setupRevealAnimation(){
      if (productObserver) productObserver.disconnect();

      productObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add("visible");
            productObserver.unobserve(entry.target);
          }
        });
      }, { threshold: 0.08, rootMargin: "0px 0px -40px 0px" });

      document.querySelectorAll(".reveal-card").forEach(card => {
        productObserver.observe(card);
      });
    }

    function observeLazyMedia(){
      if(mediaObserver){
        mediaObserver.disconnect();
      }

      mediaObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if(entry.isIntersecting){
            loadLazyMediaNow(entry.target);
            mediaObserver.unobserve(entry.target);
          }
        });
      }, {
        rootMargin: "300px 0px 300px 0px",
        threshold: 0.01
      });

      document.querySelectorAll("img.lazy-media").forEach(img => {
        if(img.dataset.src && !img.dataset.realLoaded){
          mediaObserver.observe(img);
        }
      });
    }

    function loadLazyMediaNow(img){
      if(!img || img.dataset.realLoaded === "1") return;
      const realSrc = img.dataset.src;
      if(!realSrc) return;
      img.dataset.realLoaded = "1";
      img.src = realSrc;
    }

    function scrollToCategorySection(catId){
      const sec = document.getElementById(`category-section-${catId}`);
      if(sec){
        const headerHeight = document.getElementById("siteHeader")?.offsetHeight || 0;
        const y = sec.getBoundingClientRect().top + window.scrollY - headerHeight - 18;
        window.scrollTo({ top: y, behavior: "smooth" });
      }
    }

    function handleMediaLoad(img){
      img.classList.add("media-loaded");
      const container = img.closest(".img-container");
      if(container){
        const loader = container.querySelector(".product-image-loader");
        if(loader) loader.classList.add("hidden");
      }
      const fade = img.parentElement?.querySelector(".soft-image-fade, .cat-image-fade");
      if(fade) fade.classList.add("hidden");
      const ownFade = img.closest(".cat-icon-wrapper")?.querySelector(".cat-image-fade");
      if(ownFade) ownFade.classList.add("hidden");
    }

    function handleMediaError(img, fallback){
      if(img.dataset.fallbackDone === "1"){
        handleMediaLoad(img);
        return;
      }
      img.dataset.fallbackDone = "1";
      img.dataset.realLoaded = "1";
      img.src = fallback || fallbackImg;
    }

    function hideBannerLoader(){
      const loader = document.getElementById("topBannerLoader");
      if(loader) loader.classList.add("hidden");
      const banner = document.getElementById("topBanner");
      if(banner) banner.classList.add("media-loaded");
    }

    function addToCart(productId){
      const p = products.find(x => x.id === productId);
      if(!p) return;

      const existing = cart.find(i => i.id === p.id);
      if(existing){
        existing.qty += 1;
      }else{
        cart.push({
          id: p.id,
          nameAr: p.nameAr,
          nameEn: p.nameEn,
          price: p.price,
          image1: p.image1,
          image2: p.image2,
          selected: true,
          qty: 1
        });
      }

      saveCart();
      updateBadges();
      renderCart();
      showToast(t("added-cart"));
    }

    function toggleWish(productId){
      const idx = wishlist.indexOf(productId);
      if(idx > -1){
        wishlist.splice(idx, 1);
        showToast(t("removed-wish"));
      }else{
        wishlist.push(productId);
        showToast(t("added-wish"));
      }
      saveWishlist();
      updateBadges();
      renderProductsSections();
      renderWishlist();
    }

    function updateBadges(){
      const cartCount = cart.reduce((a, b) => a + Number(b.qty || 1), 0);
      const wishCount = wishlist.length;

      document.getElementById("cart-badge-header").textContent = cartCount;
      document.getElementById("cart-badge-bottom").textContent = cartCount;
      document.getElementById("wish-badge").textContent = wishCount;
      document.getElementById("sidebarCartCount").textContent = cartCount;
      document.getElementById("sidebarWishCount").textContent = wishCount;
    }

    function renderCart(){
      const container = document.getElementById("cart-content");

      if(!cart.length){
        container.innerHTML = `<div class="empty-box mt-4">${t("empty-cart")}</div>`;
        updateCartTotal();
        return;
      }

      container.innerHTML = cart.map(item => `
        <div class="flex gap-3 border border-gray-100 rounded-2xl p-3">
          <div class="pt-1">
            <input class="cart-item-check" type="checkbox" ${item.selected ? 'checked' : ''} onchange="toggleCartSelect('${item.id}')">
          </div>

          <img src="${escapeHtml(item.image1 || fallbackImg)}" class="w-16 h-20 object-cover rounded-xl border" loading="lazy">

          <div class="flex-1">
            <h4 class="text-xs font-black text-gray-800 mb-1 line-clamp-2">${escapeHtml(lang === "ar" ? (item.nameAr || item.nameEn || "") : (item.nameEn || item.nameAr || ""))}</h4>
            <p class="text-sm font-black text-[#14454d] mb-3">${money(item.price)}</p>

            <div class="flex items-center justify-between gap-3">
              <div class="flex items-center gap-2">
                <button class="w-8 h-8 rounded-full bg-gray-100 font-black" onclick="changeQty('${item.id}', -1)">-</button>
                <span class="font-black text-sm min-w-[20px] text-center">${item.qty}</span>
                <button class="w-8 h-8 rounded-full bg-gray-100 font-black" onclick="changeQty('${item.id}', 1)">+</button>
              </div>

              <button class="text-red-500 text-xs font-black" onclick="removeFromCart('${item.id}')">×</button>
            </div>
          </div>
        </div>
      `).join("");

      updateCartTotal();
    }

    function renderWishlist(){
      const container = document.getElementById("wish-content");
      const items = products.filter(p => wishlist.includes(p.id));

      if(!items.length){
        container.innerHTML = `<div class="empty-box mt-4">${t("empty-wish")}</div>`;
        return;
      }

      container.innerHTML = `<div class="desktop-products-grid">${items.map((p) => renderProductCard(p)).join("")}</div>`;
      setupRevealAnimation();
      observeLazyMedia();
    }

    function toggleCartSelect(id){
      const item = cart.find(i => i.id === id);
      if(!item) return;
      item.selected = !item.selected;
      saveCart();
      updateCartTotal();
    }

    function selectAllCartItems(){
      const allSelected = cart.every(i => i.selected);
      cart.forEach(i => i.selected = !allSelected);
      saveCart();
      renderCart();
    }

    function updateCartTotal(){
      const total = cart.filter(i => i.selected).reduce((sum, item) => sum + (Number(item.price || 0) * Number(item.qty || 1)), 0);
      document.getElementById("cart-total").textContent = money(total);
    }

    function changeQty(id, delta){
      const item = cart.find(i => i.id === id);
      if(!item) return;
      item.qty = Number(item.qty || 1) + delta;
      if(item.qty <= 0) cart = cart.filter(i => i.id !== id);
      saveCart();
      updateBadges();
      renderCart();
    }

    function removeFromCart(id){
      cart = cart.filter(i => i.id !== id);
      saveCart();
      updateBadges();
      renderCart();
      showToast(t("removed-cart"));
    }

    function checkoutSelectedCart(){
      const selectedItems = cart.filter(i => i.selected);
      if(!selectedItems.length){
        showToast(t("choose-item"));
        return;
      }

      sessionStorage.setItem(LOCAL_KEYS.checkoutSelection, JSON.stringify({
        source: "cart",
        items: selectedItems
      }));

      window.location.href = "pay.html";
    }

    function goOrderPage(){
      if(currentUser){
        window.location.href = "order.html";
      }else{
        sessionStorage.setItem("login_redirect_1885", "order.html");
        window.location.href = "login.html";
      }
    }

    function toggleLang(){
      lang = lang === "ar" ? "en" : "ar";
      applyLanguageTexts();
    }

    function scrollToTopPage(){
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function handleScrollTopButton(){
      const btn = document.getElementById("scrollTopBtn");
      if(!btn) return;
      if(window.scrollY > 240){
        btn.classList.add("show");
      }else{
        btn.classList.remove("show");
      }
    }

    async function loadStoreData(){
      const [storeSnap, bannersSnap, categoriesSnap, productsSnap, sectionsSnap, menuSnap, methodsSnap, socialSnap] = await Promise.all([
        rtdb1885.ref(PATHS.store).get(),
        rtdb1885.ref(PATHS.banners).get(),
        rtdb1885.ref(PATHS.categories).get(),
        rtdb1885.ref(PATHS.products).get(),
        rtdb1885.ref(PATHS.pageSections).get(),
        rtdb1885.ref(PATHS.menuItems).get(),
        rtdb1885.ref(PATHS.paymentMethods).get(),
        rtdb1885.ref(PATHS.socialLinks).get()
      ]);

      const store = storeSnap.val() || {};
      const banners = bannersSnap.val() || {};

      storeSettings = {
        storeName: store.storeName || store.storeNameAr || "متجر طوفان",
        storeNameEn: store.storeNameEn || store.storeName || "Tofan Store",
        storeLogoUrl: store.storeLogoUrl || fallbackLogo,
        bannerTopUrl: banners.topBannerUrl || store.topBannerUrl || ""
      };

      categories = normalizeCategories(categoriesSnap.val() || {});
      products = normalizeProducts(productsSnap.val() || {});
      pageSections = normalizeSections(sectionsSnap.val() || {});
      menuItems = normalizeMenuItems(menuSnap.val() || {});
      paymentMethods = normalizePaymentMethods(methodsSnap.val() || {});
      socialLinks = normalizeSocialLinks(socialSnap.val() || {});
    }

    function attachAuthListener(){
      auth1885.onAuthStateChanged(user => {
        currentUser = user || null;
        if(sidebarHydrated) renderUserBox();
      });
    }

    async function initPage(){
      try{
        setLoadingBar(true);
        attachAuthListener();
        await loadStoreData();
        await preloadCriticalAssets();

        updateStoreUI();
        renderCategoriesSlider();
        renderProductsSections();
        renderDynamicSections();
        renderCustomerReviews();
        renderFooterSection();
        updateBadges();
        renderCart();
        renderWishlist();
        applyLanguageTexts();
        handleScrollTopButton();
      }catch(err){
        console.error(err);
        document.getElementById("products-sections").innerHTML = `<div class="empty-box">${t("empty-products")}</div>`;
      }finally{
        setLoadingBar(false);
      }
    }

    window.addEventListener("load", initPage);
    window.addEventListener("scroll", handleScrollTopButton, { passive: true });
  </script>
</body>
</html>
